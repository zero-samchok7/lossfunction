<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>추세선 탐구</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
            background: #f0f4f8; height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column; color: #2d3748;
        }
        header {
            text-align: center; padding: 9px 16px; font-size: 1.05rem; font-weight: 700;
            background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.08); flex-shrink: 0;
        }
        .main { display: flex; flex: 1; gap: 8px; padding: 8px; overflow: hidden; min-height: 0; }
        .panel {
            background: #fff; border-radius: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .panel-title {
            font-size: 0.78rem; font-weight: 700; color: #a0aec0;
            text-transform: uppercase; letter-spacing: 0.06em;
            padding: 9px 12px 7px; border-bottom: 1px solid #f0f4f8; flex-shrink: 0;
        }

        /* ── LEFT ── */
        .panel-left { width: 336px; flex-shrink: 0; }
        .table-wrap { overflow-y: auto; flex: 1; min-height: 0; }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            font-size: 0.72rem; font-weight: 700; color: #a0aec0;
            padding: 5px 2px; text-align: center;
            position: sticky; top: 0; background: #fff;
            border-bottom: 1px solid #edf2f7; z-index: 1;
        }
        tbody tr { border-bottom: 1px solid #f7fafc; }
        tbody tr:hover { background: #f7fafc; }
        .rn { font-size: 0.7rem; color: #cbd5e0; text-align: center; width: 18px; padding: 0 1px; }
        .ci { padding: 2px 1px; }
        .ci input {
            width: 100%; border: 1px solid #e2e8f0; border-radius: 4px;
            padding: 3px 3px; font-size: 0.82rem; text-align: center;
            outline: none; color: #2d3748; -moz-appearance: textfield;
        }
        .ci input::-webkit-outer-spin-button,
        .ci input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .ci input:focus { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.15); }
        .ci input.has-val { background: #ebf8ff; border-color: #90cdf4; font-weight: 600; }
        .td-err { font-size: 0.78rem; text-align: center; padding: 0 2px; font-weight: 600; width: 56px; color: #a0aec0; }
        .td-err.pos { color: #2b6cb0; }
        .td-err.neg { color: #c53030; }
        .btn-del { background: none; border: none; cursor: pointer; color: #e2e8f0; font-size: 0.9rem; width: 22px; padding: 0; }
        .btn-del:hover { color: #e53e3e; }
        .tfoot-wrap {
            border-top: 2px solid #edf2f7; flex-shrink: 0;
            padding: 6px 10px; background: #f7fafc;
        }
        .foot-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
        .foot-label { font-size: 0.78rem; color: #718096; font-weight: 600; }
        .foot-val { font-size: 0.82rem; font-weight: 700; color: #2d3748; }

        /* ── MIDDLE ── */
        .panel-mid { flex: 1; min-width: 0; position: relative; }
        .mode-bar {
            display: flex; gap: 6px; padding: 8px 10px 4px; flex-shrink: 0;
        }
        .mode-btn {
            flex: 1; padding: 6px 0; border-radius: 8px;
            font-size: 0.78rem; font-weight: 700; cursor: pointer;
            border: 1.5px solid #e2e8f0; color: #a0aec0; background: #f7fafc;
            transition: all 0.15s;
        }
        .mode-btn:hover { border-color: #cbd5e0; color: #718096; }
        .mode-btn.on-point { border-color: #667eea; color: #fff; background: #667eea; }
        .mode-btn.on-line  { border-color: #2b6cb0; color: #fff; background: #2b6cb0; }
        .canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; position: relative; }
        canvas { display: block; touch-action: none; }
        .canvas-hint {
            position: absolute; bottom: 10px; left: 0; right: 0;
            text-align: center; font-size: 0.73rem; color: #a0aec0; pointer-events: none;
        }

        /* ── RIGHT ── */
        .panel-right { width: 212px; flex-shrink: 0; overflow-y: auto; }
        .info-sec { padding: 11px 13px; border-bottom: 1px solid #f0f4f8; }
        .info-sec:last-child { border-bottom: none; }
        .sec-label { font-size: 0.73rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
        .eq-row { display: flex; align-items: center; gap: 7px; }
        .btn-clear {
            background: #fff5f5; color: #e53e3e; border: 1px solid #fed7d7;
            border-radius: 5px; font-size: 0.7rem; font-weight: 700;
            padding: 3px 7px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
        }
        .btn-clear:disabled { background: #f7fafc; color: #cbd5e0; border-color: #e2e8f0; cursor: not-allowed; }
        .equation { font-size: 0.97rem; font-weight: 700; }
        .eq-blue { color: #2b6cb0; }
        .eq-red  { color: #c53030; }
        .eq-ph   { font-size: 0.82rem; color: #cbd5e0; }
        .hint-move { font-size: 0.72rem; color: #a0aec0; margin-top: 5px; line-height: 1.4; }
        .btn-trend {
            width: 100%; padding: 8px; background: #fff5f5; color: #c53030;
            border: 1.5px solid #feb2b2; border-radius: 8px;
            font-size: 0.85rem; font-weight: 700; cursor: pointer;
        }
        .btn-trend:hover:not(:disabled) { background: #fed7d7; }
        .btn-trend:disabled { background: #f7fafc; color: #cbd5e0; border-color: #e2e8f0; cursor: not-allowed; }
        .btn-trend.on { background: #fed7d7; }
        .trend-eq { margin-top: 7px; min-height: 1.3em; }
        .bar-row { display: flex; align-items: center; gap: 5px; margin: 5px 0; }
        .bar-name { font-size: 0.73rem; font-weight: 700; min-width: 42px; text-align: right; }
        .bar-track { flex: 1; height: 17px; background: #edf2f7; border-radius: 8px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 8px; transition: width 0.28s ease; }
        .bar-red  { background: linear-gradient(90deg,#fc8181,#c53030); }
        .bar-blue { background: linear-gradient(90deg,#63b3ed,#2b6cb0); }
        .bar-val { font-size: 0.73rem; font-weight: 700; color: #4a5568; min-width: 36px; text-align: right; }
        .fb-box { margin-top: 7px; padding: 7px 9px; border-radius: 7px; font-size: 0.77rem; font-weight: 600; text-align: center; line-height: 1.4; }
        .fb-worse { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
        .fb-same  { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
        .mse-ph { font-size: 0.78rem; color: #cbd5e0; text-align: center; line-height: 1.6; padding: 3px 0; }
    </style>
</head>
<body>
<header>추세선 탐구</header>
<div class="main">

    <!-- LEFT -->
    <div class="panel panel-left">
        <div class="panel-title">데이터 입력</div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:18px"></th>
                        <th style="width:50px">x</th>
                        <th style="width:50px">y</th>
                        <th style="width:56px">오차</th>
                        <th style="width:60px">오차²</th>
                        <th style="width:22px"></th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
        <div class="tfoot-wrap">
            <div class="foot-row">
                <span class="foot-label">오차² 합 (SSE)</span>
                <span class="foot-val" id="sse-val">—</span>
            </div>
            <div class="foot-row">
                <span class="foot-label">MSE</span>
                <span class="foot-val" id="mse-val">—</span>
            </div>
        </div>
    </div>

    <!-- MIDDLE -->
    <div class="panel panel-mid">
        <div class="mode-bar">
            <button class="mode-btn on-point" id="btnModePoint" onclick="setMode('point')">점 추가 모드</button>
            <button class="mode-btn" id="btnModeLine" onclick="setMode('line')">직선 그리기 모드</button>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
            <canvas id="cvs"></canvas>
            <div class="canvas-hint" id="hint">그래프를 클릭하여 점을 추가하세요.</div>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="panel panel-right">
        <div class="info-sec">
            <div class="sec-label">내가 그린 직선</div>
            <div class="eq-row">
                <button class="btn-clear" id="btnClear" disabled onclick="clearUserLine()">지우기</button>
                <span id="userEq" class="eq-ph">직선을 그려보세요</span>
            </div>
            <div class="hint-move" id="hintMove" style="display:none">
                끝점 드래그 → 기울기 조정<br>선 중앙 드래그 → 평행이동
            </div>
        </div>
        <div class="info-sec">
            <div class="sec-label">추세선</div>
            <button class="btn-trend" id="btnTrend" disabled onclick="toggleTrend()">추세선 표시하기</button>
            <div class="trend-eq" id="trendEq"></div>
        </div>
        <div class="info-sec" style="flex:1">
            <div class="sec-label">MSE 비교</div>
            <div id="msePanel"><div class="mse-ph">직선을 그리고<br>추세선을 표시하면<br>비교됩니다.</div></div>
        </div>
    </div>

</div>
<script>
'use strict';

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
const MAX_ROWS = 40;
let rowCount  = 20;
let tableData = Array.from({length: rowCount}, () => ({x:'', y:''}));
let dataPts   = [];

let graphMode = 'point';   // 'point' | 'line'
let userLine  = null;      // {p1,p2} data coords
let trendAB   = null;      // {a,b}
let trendOn   = false;
let mseScale  = null;

// line draw state: 'idle' | 'first' | 'done' | 'drag-h' | 'moving'
let dstate    = 'idle';
let anchor1   = null;
let mDat      = null;
let dragFixed = null;
let mvStart   = null;

/* ═══════════════════════════════
   CANVAS
═══════════════════════════════ */
const cvs = document.getElementById('cvs');
const ctx  = cvs.getContext('2d');
const PAD  = {top:20, right:18, bottom:42, left:52};
let W = 0, H = 0;

const DEFAULT_VP = {xMin:0, xMax:20, yMin:0, yMax:20, tickX:5, tickY:5};
let vp = {...DEFAULT_VP};

const plotW = () => W - PAD.left - PAD.right;
const plotH = () => H - PAD.top  - PAD.bottom;
const toCanX = dx => PAD.left + (dx - vp.xMin) / (vp.xMax - vp.xMin) * plotW();
const toCanY = dy => PAD.top  + (1 - (dy - vp.yMin) / (vp.yMax - vp.yMin)) * plotH();
const toDatX = cx => vp.xMin + (cx - PAD.left) / plotW() * (vp.xMax - vp.xMin);
const toDatY = cy => vp.yMin + (1 - (cy - PAD.top) / plotH()) * (vp.yMax - vp.yMin);

function resize() {
    const wrap = document.getElementById('canvasWrap');
    W = cvs.width  = wrap.clientWidth  - 12;
    H = cvs.height = wrap.clientHeight - 12;
    redraw();
}
window.addEventListener('resize', resize);

/* ═══════════════════════════════
   AUTO SCALE
═══════════════════════════════ */
function niceStep(raw) {
    if (raw <= 0) return 1;
    const e = Math.floor(Math.log10(raw));
    const f = raw / 10**e;
    return (f < 1.5 ? 1 : f < 3.5 ? 2 : f < 7.5 ? 5 : 10) * 10**e;
}
function computeVP(pts) {
    if (pts.length < 2) return {...DEFAULT_VP};
    let xl = Math.min(...pts.map(p=>p.x)), xh = Math.max(...pts.map(p=>p.x));
    let yl = Math.min(...pts.map(p=>p.y)), yh = Math.max(...pts.map(p=>p.y));
    const xs = xh-xl || Math.abs(xh) || 1;
    const ys = yh-yl || Math.abs(yh) || 1;
    xl -= xs*0.25; xh += xs*0.25; yl -= ys*0.25; yh += ys*0.25;
    const tx = niceStep((xh-xl)/6), ty = niceStep((yh-yl)/5);
    return {
        xMin: Math.floor(xl/tx)*tx, xMax: Math.ceil(xh/tx)*tx,
        yMin: Math.floor(yl/ty)*ty, yMax: Math.ceil(yh/ty)*ty,
        tickX: tx, tickY: ty
    };
}

/* ═══════════════════════════════
   MATH
═══════════════════════════════ */
function linReg(pts) {
    const n = pts.length; if (n < 2) return null;
    let sx=0, sy=0, sxy=0, sx2=0;
    for (const p of pts) { sx+=p.x; sy+=p.y; sxy+=p.x*p.y; sx2+=p.x*p.x; }
    const d = n*sx2 - sx*sx; if (Math.abs(d) < 1e-12) return null;
    const a = (n*sxy - sx*sy) / d;
    return {a, b: (sy - a*sx) / n};
}
function calcMSE(pts, a, b) {
    if (!pts.length) return NaN;
    return pts.reduce((s,p) => s + (p.y-(a*p.x+b))**2, 0) / pts.length;
}
function lineAB(p1, p2) {
    const dx = p2.x - p1.x; if (Math.abs(dx) < 1e-12) return null;
    const a = (p2.y - p1.y) / dx;
    return {a, b: p1.y - a*p1.x};
}
function clipToVP(a, b, v) {
    const eps = 1e-9, cl = (x,l,h) => Math.max(l, Math.min(h, x));
    const s = [];
    const add = (x, y) => {
        if (x > v.xMin-eps && x < v.xMax+eps && y > v.yMin-eps && y < v.yMax+eps)
            s.push({x: cl(x,v.xMin,v.xMax), y: cl(y,v.yMin,v.yMax)});
    };
    add(v.xMin, a*v.xMin+b); add(v.xMax, a*v.xMax+b);
    if (Math.abs(a) > 1e-12) { add((v.yMin-b)/a, v.yMin); add((v.yMax-b)/a, v.yMax); }
    const u = [];
    for (const p of s)
        if (!u.some(q => Math.abs(q.x-p.x)<1e-6 && Math.abs(q.y-p.y)<1e-6)) u.push(p);
    if (u.length < 2) return null;
    u.sort((p,q) => p.x-q.x);
    return [u[0], u[u.length-1]];
}
function getUserAB() { return userLine ? lineAB(userLine.p1, userLine.p2) : null; }
function getUserSeg() {
    const ab = getUserAB(); if (!ab) return null;
    return clipToVP(ab.a, ab.b, vp);
}
function distLinePx(cx, cy) {
    const seg = getUserSeg(); if (!seg) return Infinity;
    const ax=toCanX(seg[0].x), ay=toCanY(seg[0].y);
    const bx=toCanX(seg[1].x), by=toCanY(seg[1].y);
    const dx=bx-ax, dy=by-ay, l2=dx*dx+dy*dy;
    if (l2 < 1e-10) return Math.hypot(cx-ax, cy-ay);
    const t = Math.max(0, Math.min(1, ((cx-ax)*dx+(cy-ay)*dy)/l2));
    return Math.hypot(cx-(ax+t*dx), cy-(ay+t*dy));
}
function hitHandle(cx, cy) {
    const seg = getUserSeg(); if (!seg) return -1;
    const HR = 24;
    if (Math.hypot(cx-toCanX(seg[0].x), cy-toCanY(seg[0].y)) < HR) return 0;
    if (Math.hypot(cx-toCanX(seg[1].x), cy-toCanY(seg[1].y)) < HR) return 1;
    return -1;
}

/* ═══════════════════════════════
   DRAW
═══════════════════════════════ */
const tickStart = (m, s) => Math.ceil(m/s)*s;
const round = v => Math.round(v*1e9)/1e9;

function redraw() {
    ctx.clearRect(0, 0, W, H);
    drawGrid(); drawAxes();
    if (trendOn && trendAB) drawResiduals();
    const ab = getUserAB();
    if (ab) { drawSeg(clipToVP(ab.a, ab.b, vp), '#2b6cb0', 2.5, []); drawHandles(); }
    if (trendOn && trendAB) drawSeg(clipToVP(trendAB.a, trendAB.b, vp), '#c53030', 2.5, []);
    drawPoints();
    if (dstate === 'first' && anchor1) {
        drawHandleDot(toCanX(anchor1.x), toCanY(anchor1.y), '#2b6cb0');
        if (mDat) {
            const pab = lineAB(anchor1, mDat);
            if (pab) {
                ctx.save(); ctx.globalAlpha = 0.4;
                drawSeg(clipToVP(pab.a, pab.b, vp), '#2b6cb0', 2, [6,4]);
                ctx.globalAlpha = 1;
                drawHandleDot(toCanX(mDat.x), toCanY(mDat.y), '#2b6cb0');
                ctx.restore();
            }
        }
    }
}
function drawGrid() {
    ctx.save(); ctx.strokeStyle = '#edf2f7'; ctx.lineWidth = 1;
    for (let x=tickStart(vp.xMin,vp.tickX); x<=vp.xMax+1e-9; x+=vp.tickX) {
        const cx=toCanX(round(x)); ctx.beginPath(); ctx.moveTo(cx,PAD.top); ctx.lineTo(cx,H-PAD.bottom); ctx.stroke();
    }
    for (let y=tickStart(vp.yMin,vp.tickY); y<=vp.yMax+1e-9; y+=vp.tickY) {
        const cy=toCanY(round(y)); ctx.beginPath(); ctx.moveTo(PAD.left,cy); ctx.lineTo(W-PAD.right,cy); ctx.stroke();
    }
    ctx.restore();
}
function drawAxes() {
    ctx.save(); ctx.strokeStyle='#cbd5e0'; ctx.lineWidth=1.5;
    const ay = (vp.yMin<=0 && vp.yMax>=0) ? toCanY(0) : H-PAD.bottom;
    const ax = (vp.xMin<=0 && vp.xMax>=0) ? toCanX(0) : PAD.left;
    ctx.beginPath(); ctx.moveTo(PAD.left,ay); ctx.lineTo(W-PAD.right,ay); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ax,PAD.top); ctx.lineTo(ax,H-PAD.bottom); ctx.stroke();
    const fs = Math.max(9, W*0.022);
    ctx.font = `${fs}px sans-serif`; ctx.fillStyle = '#a0aec0';
    ctx.textAlign='center'; ctx.textBaseline='top';
    for (let x=tickStart(vp.xMin,vp.tickX); x<=vp.xMax+1e-9; x+=vp.tickX)
        ctx.fillText(fmtN(round(x)), toCanX(round(x)), H-PAD.bottom+4);
    ctx.textAlign='right'; ctx.textBaseline='middle';
    for (let y=tickStart(vp.yMin,vp.tickY); y<=vp.yMax+1e-9; y+=vp.tickY)
        ctx.fillText(fmtN(round(y)), PAD.left-4, toCanY(round(y)));
    ctx.restore();
}
function drawSeg(seg, color, lw, dash) {
    if (!seg) return;
    ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.setLineDash(dash); ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(toCanX(seg[0].x),toCanY(seg[0].y)); ctx.lineTo(toCanX(seg[1].x),toCanY(seg[1].y)); ctx.stroke();
    ctx.restore();
}
function drawResiduals() {
    ctx.save(); ctx.strokeStyle='rgba(197,48,48,0.33)'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
    for (const p of dataPts) {
        const yh = trendAB.a*p.x + trendAB.b;
        ctx.beginPath(); ctx.moveTo(toCanX(p.x),toCanY(p.y)); ctx.lineTo(toCanX(p.x),toCanY(yh)); ctx.stroke();
    }
    ctx.restore();
}
function drawPoints() {
    const r = Math.max(5, W*0.012);
    for (const p of dataPts) {
        ctx.beginPath(); ctx.arc(toCanX(p.x),toCanY(p.y),r,0,Math.PI*2);
        ctx.fillStyle='#2d3748'; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    }
}
function drawHandleDot(cx, cy, color) {
    ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,9,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.stroke(); ctx.restore();
}
function drawHandles() {
    const seg = getUserSeg(); if (!seg) return;
    drawHandleDot(toCanX(seg[0].x), toCanY(seg[0].y), '#2b6cb0');
    drawHandleDot(toCanX(seg[1].x), toCanY(seg[1].y), '#2b6cb0');
}
function fmtN(n) { return Number.isInteger(n) ? String(n) : parseFloat(n.toPrecision(4)).toString(); }

/* ═══════════════════════════════
   TABLE
═══════════════════════════════ */
function createRowEl(i) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td class="rn">${i+1}</td>
        <td class="ci"><input type="number" step="any" placeholder="−" data-r="${i}" data-c="x"></td>
        <td class="ci"><input type="number" step="any" placeholder="−" data-r="${i}" data-c="y"></td>
        <td class="td-err" id="e-${i}">—</td>
        <td class="td-err" id="esq-${i}">—</td>
        <td><button class="btn-del" data-r="${i}">×</button></td>`;
    tr.querySelectorAll('input').forEach(inp => inp.addEventListener('input', onCellInput));
    tr.querySelector('.btn-del').addEventListener('click', e => {
        const r = +e.currentTarget.dataset.r;
        tableData[r] = {x:'', y:''};
        ['x','y'].forEach(c => {
            const el = document.querySelector(`input[data-r="${r}"][data-c="${c}"]`);
            if (el) { el.value = ''; el.classList.remove('has-val'); }
        });
        onDataChange();
    });
    return tr;
}

function buildTable() {
    const tb = document.getElementById('tbody'); tb.innerHTML = '';
    for (let i=0; i<rowCount; i++) tb.appendChild(createRowEl(i));
    setupNav();
}

function addRow() {
    if (rowCount >= MAX_ROWS) return false;
    const i = rowCount;
    tableData.push({x:'', y:''});
    rowCount++;
    const tr = createRowEl(i);
    document.getElementById('tbody').appendChild(tr);
    setupNav();
    tr.scrollIntoView({behavior:'smooth', block:'nearest'});
    return true;
}

/* ═══════════════════════════════
   NAVIGATION
═══════════════════════════════ */
function getInputsOrdered() {
    const arr = [];
    for (let i=0; i<rowCount; i++) {
        const xi = document.querySelector(`input[data-r="${i}"][data-c="x"]`);
        const yi = document.querySelector(`input[data-r="${i}"][data-c="y"]`);
        if (xi) arr.push(xi);
        if (yi) arr.push(yi);
    }
    return arr;
}
function setupNav() {
    const inputs = getInputsOrdered();
    inputs.forEach((inp, i) => {
        inp.onkeydown = e => {
            if (e.key !== 'Enter' && e.key !== 'Tab') return;
            if (e.key === 'Tab' && e.shiftKey) return;
            e.preventDefault();
            let next;
            if (i === inputs.length - 1) {
                next = inputs.find((inp2, j) => j%2===0 && inp2.value==='') ?? inputs[0];
            } else {
                next = inputs[i + 1];
            }
            next?.focus();
        };
    });
}

function onCellInput(e) {
    const r = +e.target.dataset.r, c = e.target.dataset.c;
    tableData[r][c] = e.target.value;
    e.target.classList.toggle('has-val', e.target.value !== '');
    onDataChange();
}

/* ═══════════════════════════════
   POINT FROM GRAPH
═══════════════════════════════ */
function addPointFromGraph(datX, datY) {
    const x = Math.round(datX * 10) / 10;
    const y = Math.round(datY * 10) / 10;

    // Find first row where both x and y are empty
    let idx = tableData.findIndex(r => r.x === '' && r.y === '');

    if (idx === -1) {
        // All rows occupied — expand if possible
        if (rowCount >= MAX_ROWS) return;
        if (!addRow()) return;
        idx = rowCount - 1;
    }

    tableData[idx] = {x: String(x), y: String(y)};
    const xEl = document.querySelector(`input[data-r="${idx}"][data-c="x"]`);
    const yEl = document.querySelector(`input[data-r="${idx}"][data-c="y"]`);
    if (xEl) { xEl.value = x; xEl.classList.add('has-val'); }
    if (yEl) { yEl.value = y; yEl.classList.add('has-val'); }

    onDataChange();
}

/* ═══════════════════════════════
   DATA
═══════════════════════════════ */
function onDataChange() {
    dataPts = tableData
        .filter(r => r.x!=='' && r.y!=='' && !isNaN(+r.x) && !isNaN(+r.y))
        .map(r => ({x:+r.x, y:+r.y}));
    vp = computeVP(dataPts);
    trendAB = linReg(dataPts);
    mseScale = null;
    updateHint(); updateErrCols(); updateRight(); redraw();
}

/* ═══════════════════════════════
   ERROR COLS
═══════════════════════════════ */
function updateErrCols() {
    let sse = 0, n = 0;
    const show = trendOn && !!trendAB;
    for (let i=0; i<rowCount; i++) {
        const eEl  = document.getElementById(`e-${i}`);
        const sqEl = document.getElementById(`esq-${i}`);
        if (!eEl || !sqEl) continue;
        const r = tableData[i];
        const valid = r.x!=='' && r.y!=='' && !isNaN(+r.x) && !isNaN(+r.y);
        if (!valid || !show) {
            eEl.textContent='—'; eEl.className='td-err';
            sqEl.textContent='—'; sqEl.className='td-err';
            continue;
        }
        const err = +r.y - (trendAB.a * +r.x + trendAB.b);
        const esq = err * err;
        sse += esq; n++;
        const cls = Math.abs(err) < 0.005 ? '' : (err > 0 ? ' pos' : ' neg');
        eEl.textContent  = err.toFixed(2); eEl.className  = 'td-err' + cls;
        sqEl.textContent = esq.toFixed(2); sqEl.className = 'td-err';
    }
    document.getElementById('sse-val').textContent = (show && n>0) ? sse.toFixed(2) : '—';
    document.getElementById('mse-val').textContent = (show && n>0) ? (sse/n).toFixed(2) : '—';
}

/* ═══════════════════════════════
   RIGHT PANEL
═══════════════════════════════ */
function fmtEq(a, b) {
    return `y = ${a.toFixed(2)}x ${b>=0?'+':'−'} ${Math.abs(b).toFixed(2)}`;
}
function updateRight() {
    const ab = getUserAB();
    const eqEl = document.getElementById('userEq');
    const clr  = document.getElementById('btnClear');
    const hm   = document.getElementById('hintMove');
    if (userLine && ab) {
        eqEl.className='equation eq-blue'; eqEl.textContent=fmtEq(ab.a,ab.b);
        clr.disabled=false; hm.style.display='';
    } else {
        eqEl.className='eq-ph'; eqEl.textContent='직선을 그려보세요';
        clr.disabled=true; hm.style.display='none';
    }
    const btn = document.getElementById('btnTrend');
    const canT = !!userLine && dataPts.length>=2 && !!trendAB;
    btn.disabled=!canT;
    btn.textContent = trendOn ? '추세선 숨기기' : '추세선 표시하기';
    btn.classList.toggle('on', trendOn);
    const teq = document.getElementById('trendEq');
    if (trendOn && trendAB) { teq.className='trend-eq equation eq-red'; teq.textContent=fmtEq(trendAB.a,trendAB.b); }
    else { teq.className='trend-eq'; teq.textContent=''; }

    const mp = document.getElementById('msePanel');
    if (!trendOn||!trendAB||!ab||dataPts.length<2) {
        mp.innerHTML='<div class="mse-ph">직선을 그리고<br>추세선을 표시하면<br>비교됩니다.</div>'; return;
    }
    const mt=calcMSE(dataPts,trendAB.a,trendAB.b), mu=calcMSE(dataPts,ab.a,ab.b);
    if (mseScale===null) mseScale=Math.max(mt,mu,0.001);
    const tP=Math.min(100,mt/mseScale*100).toFixed(1), uP=Math.min(100,mu/mseScale*100).toFixed(1);
    const ratio=mu/(mt+1e-10);
    const fb=ratio<=1.005
        ?`<div class="fb-box fb-same">추세선과 같은 직선! MSE가 최소입니다.</div>`
        :`<div class="fb-box fb-worse">내 직선이 추세선보다 <strong>${((ratio-1)*100).toFixed(1)}%</strong> 더 큽니다.</div>`;
    mp.innerHTML=`
        <div class="bar-row"><span class="bar-name" style="color:#c53030">추세선</span><div class="bar-track"><div class="bar-fill bar-red" style="width:${tP}%"></div></div><span class="bar-val">${mt.toFixed(2)}</span></div>
        <div class="bar-row"><span class="bar-name" style="color:#2b6cb0">내 직선</span><div class="bar-track"><div class="bar-fill bar-blue" style="width:${uP}%"></div></div><span class="bar-val">${mu.toFixed(2)}</span></div>
        ${fb}`;
}

function updateHint() {
    const h = document.getElementById('hint');
    if (graphMode === 'point') {
        h.textContent = '그래프를 클릭하여 점을 추가하세요.';
        h.style.display = '';
    } else {
        if (dstate==='idle')       { h.textContent='첫 번째 점을 클릭하세요.'; h.style.display=''; }
        else if (dstate==='first') { h.textContent='두 번째 점을 클릭하여 직선을 완성하세요.'; h.style.display=''; }
        else h.style.display = 'none';
    }
}

/* ═══════════════════════════════
   MODE
═══════════════════════════════ */
function setMode(mode) {
    graphMode = mode;
    if (mode === 'point' && dstate === 'first') {
        dstate = 'idle'; anchor1 = null;
    }
    document.getElementById('btnModePoint').className = 'mode-btn' + (mode==='point' ? ' on-point' : '');
    document.getElementById('btnModeLine').className  = 'mode-btn' + (mode==='line'  ? ' on-line'  : '');
    cvs.style.cursor = 'crosshair';
    updateHint(); redraw();
}

/* ═══════════════════════════════
   ACTIONS
═══════════════════════════════ */
function clearUserLine() {
    userLine=null; dstate='idle'; anchor1=null; trendOn=false; mseScale=null;
    updateHint(); updateErrCols(); updateRight(); redraw();
}
function toggleTrend() {
    trendOn=!trendOn; if(trendOn) mseScale=null;
    updateErrCols(); updateRight(); redraw();
}

/* ═══════════════════════════════
   INTERACTION
═══════════════════════════════ */
function getPos(e) {
    const rect = cvs.getBoundingClientRect();
    const src = e.touches?.[0] ?? e.changedTouches?.[0] ?? e;
    return {
        cx: (src.clientX - rect.left) * (W / rect.width),
        cy: (src.clientY - rect.top)  * (H / rect.height)
    };
}
function inPlot(cx, cy) {
    return cx>=PAD.left && cx<=W-PAD.right && cy>=PAD.top && cy<=H-PAD.bottom;
}

function onDown(cx, cy) {
    // Handle / line dragging — works in both modes (line already drawn)
    if (dstate === 'done') {
        const hi = hitHandle(cx, cy);
        if (hi >= 0) {
            const seg = getUserSeg();
            dragFixed = {x: seg[1-hi].x, y: seg[1-hi].y};
            dstate = 'drag-h'; cvs.style.cursor = 'grabbing';
        } else if (distLinePx(cx, cy) < 16) {
            mvStart = {datX:toDatX(cx), datY:toDatY(cy), p1:{...userLine.p1}, p2:{...userLine.p2}};
            dstate = 'moving'; cvs.style.cursor = 'move';
        }
    }
}
function onDrag(cx, cy) {
    mDat = {x: toDatX(cx), y: toDatY(cy)};
    if (dstate === 'drag-h' && dragFixed) {
        const d=mDat, f=dragFixed;
        if (Math.abs(d.x-f.x)>1e-10 || Math.abs(d.y-f.y)>1e-10) {
            userLine={p1:{...d}, p2:{...f}};
            mseScale=null; updateErrCols(); updateRight(); redraw();
        }
    } else if (dstate === 'moving' && mvStart) {
        const ddx=mDat.x-mvStart.datX, ddy=mDat.y-mvStart.datY;
        userLine={p1:{x:mvStart.p1.x+ddx,y:mvStart.p1.y+ddy}, p2:{x:mvStart.p2.x+ddx,y:mvStart.p2.y+ddy}};
        mseScale=null; updateErrCols(); updateRight(); redraw();
    }
}
function onHover(cx, cy) {
    mDat = {x: toDatX(cx), y: toDatY(cy)};
    if (dstate === 'first') { redraw(); return; }
    if (dstate === 'done') {
        const hi = hitHandle(cx, cy);
        cvs.style.cursor = hi>=0 ? 'grab' : distLinePx(cx,cy)<16 ? 'move' : 'crosshair';
    }
}
function onTap(cx, cy) {
    if (!inPlot(cx, cy)) return;
    const x = toDatX(cx), y = toDatY(cy);

    if (graphMode === 'point') {
        addPointFromGraph(x, y);
        return;
    }

    // Line mode
    if (dstate === 'idle') {
        anchor1={x,y}; mDat={x,y}; dstate='first';
        updateHint(); redraw();
    } else if (dstate === 'first') {
        if (Math.abs(x-anchor1.x)>1e-10 || Math.abs(y-anchor1.y)>1e-10) {
            userLine={p1:{...anchor1}, p2:{x,y}};
            dstate='done'; anchor1=null; mseScale=null;
            updateHint(); updateErrCols(); updateRight(); redraw();
        }
    }
}
function onUp() {
    if (dstate==='drag-h') { dstate='done'; dragFixed=null; cvs.style.cursor='crosshair'; }
    else if (dstate==='moving') { dstate='done'; mvStart=null; cvs.style.cursor='crosshair'; }
}

/* mouse */
let mDown = false;
cvs.addEventListener('mousedown', e => { mDown=true; const{cx,cy}=getPos(e); onDown(cx,cy); });
cvs.addEventListener('mousemove', e => {
    const{cx,cy}=getPos(e);
    if (mDown) onDrag(cx,cy); else onHover(cx,cy);
});
cvs.addEventListener('mouseup', e => {
    if (!mDown) return; mDown=false;
    const{cx,cy}=getPos(e);
    if (dstate==='drag-h'||dstate==='moving') { onUp(); return; }
    onTap(cx,cy);
});
cvs.addEventListener('mouseleave', () => {
    if (mDown && (dstate==='drag-h'||dstate==='moving')) onUp();
    mDown=false;
});

/* touch */
let tStart=null, tMoved=false;
cvs.addEventListener('touchstart', e => {
    e.preventDefault(); tMoved=false;
    const{cx,cy}=getPos(e); tStart={cx,cy}; onDown(cx,cy);
},{passive:false});
cvs.addEventListener('touchmove', e => {
    e.preventDefault(); tMoved=true;
    const{cx,cy}=getPos(e); onDrag(cx,cy);
},{passive:false});
cvs.addEventListener('touchend', e => {
    e.preventDefault();
    if (dstate==='drag-h'||dstate==='moving') { onUp(); return; }
    if (!tMoved && tStart) onTap(tStart.cx, tStart.cy);
    tStart=null;
},{passive:false});

/* ═══════════════════════════════
   INIT
═══════════════════════════════ */
buildTable();
resize();
</script>
