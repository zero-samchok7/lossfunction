<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>4차시A — 손실함수의 이차곡면</title>
  <link rel="stylesheet" href="lesson-common.css">
  <style>
    .lesson-body { gap: 8px; padding: 8px; }

    .panel {
      background: #fff; border-radius: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      display: flex; flex-direction: column; overflow: hidden;
    }

    .panel-left   { width: 240px; flex-shrink: 0; padding: 0; gap: 0; border-right: none; }
    .panel-center { width: 240px; flex-shrink: 0; }
    .panel-3d     { flex: 1; min-width: 0; }

    .panel-title {
      font-size: 0.78rem; font-weight: 700; color: #a0aec0;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 9px 12px 7px; border-bottom: 1px solid #f0f4f8; flex-shrink: 0;
    }

    /* 데이터 패널 */
    .btn-row2 { display: flex; gap: 5px; padding: 6px 8px 5px; flex-shrink: 0; }
    .btn-row2 button {
      flex: 1; padding: 5px 4px; border-radius: 7px; font-size: 0.74rem; font-weight: 700;
      cursor: pointer; border: 1.5px solid #e2e8f0; background: #f7fafc; color: #4a5568;
    }
    .btn-row2 button:hover:not(:disabled) { background: #edf2f7; }
    .btn-row2 button:disabled { opacity: 0.4; cursor: not-allowed; }
    .table-wrap { overflow-y: auto; flex: 1; min-height: 0; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-size: 0.7rem; font-weight: 700; color: #a0aec0;
      padding: 4px 2px; text-align: center;
      position: sticky; top: 0; background: #fff;
      border-bottom: 1px solid #edf2f7; z-index: 1;
    }
    .data-table tbody tr { border-bottom: 1px solid #f7fafc; }
    .data-table tbody tr:hover { background: #f7fafc; }
    .rn { font-size: 0.68rem; color: #cbd5e0; text-align: center; width: 16px; padding: 0 1px; }
    .data-table td { padding: 2px 1px; }
    .data-table input[type=number] {
      width: 100%; border: 1px solid #e2e8f0; border-radius: 4px;
      padding: 3px; font-size: 0.8rem; text-align: center;
      outline: none; color: #2d3748; background: #fff; -moz-appearance: textfield;
    }
    .data-table input::-webkit-outer-spin-button,
    .data-table input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .data-table input:focus { border-color: #667eea; }
    .data-table input.has-val { background: #ebf8ff; border-color: #90cdf4; font-weight: 600; }

    /* 수식·통계 패널 */
    .center-scroll { overflow-y: auto; flex: 1; min-height: 0; }
    .ctrl-sec { padding: 10px 12px; border-bottom: 1px solid #f0f4f8; }
    .ctrl-sec:last-child { border-bottom: none; }
    .sec-label { font-size: 0.7rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
    .formula-display {
      background: #f7fafc; border-radius: 8px; padding: 9px 11px;
      font-size: 0.83rem; line-height: 1.9; color: #4a5568;
    }
    .formula-display .hl { color: #6c5ce7; font-weight: 700; }
    .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; }
    .stat-label { color: #718096; font-weight: 600; }
    .stat-val   { font-weight: 700; color: #2d3748; }
    .stat-val.opt { color: #276749; }
    .find-btn {
      display: block; width: 100%; margin-top: 8px;
      padding: 6px 0; border-radius: 8px; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; border: 1.5px solid #9ae6b4; background: #c6f6d5; color: #276749;
    }
    .find-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 3D 패널 */
    .surface-wrap { flex: 1; min-height: 0; position: relative; cursor: grab; }
    .surface-wrap:active { cursor: grabbing; }
    #surfaceCvs { display: block; width: 100%; height: 100%; }
    .sl-row { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; }
    .sl-row label { font-weight: 700; min-width: 16px; }
    .sl-row input[type=range] { flex: 1; }
    .sv { font-weight: 700; color: #2d3748; min-width: 32px; font-size: 0.82rem; }
  </style>
</head>
<body>
<header class="lesson-header">
  <a href="index.html" class="back-link">← 목록</a>
  <span class="lesson-title">4차시A — 손실함수의 이차곡면</span>
</header>
<main class="lesson-body">

  <!-- 1단: 데이터 -->
  <div class="panel panel-left">
    <div class="panel-title">데이터</div>
    <div class="btn-row2">
      <button id="btnSample">샘플 생성</button>
      <button id="btnReset">초기화</button>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead><tr><th class="rn">#</th><th>x</th><th>y</th></tr></thead>
        <tbody id="dataBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 2단: 수식 & 통계 -->
  <div class="panel panel-center">
    <div class="panel-title">손실함수 &amp; 통계</div>
    <div class="center-scroll">
      <div class="ctrl-sec">
        <div class="sec-label">MSE(a, b) 전개식</div>
        <div class="formula-display">
          <div>MSE(a,b) =</div>
          <div>&nbsp;(1/n) × Σ(yᵢ − axᵢ − b)²</div>
          <div style="margin-top:5px;">
            = <span class="hl" id="fA">—</span>·a²
            + <span class="hl" id="fB">—</span>·b²
            + <span class="hl" id="fC">—</span>·ab
          </div>
          <div>
            &nbsp;&nbsp;− <span class="hl" id="fD">—</span>·a
            − <span class="hl" id="fE">—</span>·b
            + <span class="hl" id="fF">—</span>
          </div>
        </div>
      </div>
      <div class="ctrl-sec">
        <div class="sec-label">현재 점</div>
        <div class="stat-row"><span class="stat-label">a</span><span class="stat-val" id="curA">—</span></div>
        <div class="stat-row"><span class="stat-label">b</span><span class="stat-val" id="curB">—</span></div>
        <div class="stat-row"><span class="stat-label">MSE</span><span class="stat-val" id="curMSE">—</span></div>
        <div style="margin-top:8px; display:flex; flex-direction:column; gap:6px;">
          <div class="sl-row">
            <label style="color:#e53e3e">a</label>
            <input type="range" id="sliderA" min="-5" max="5" step="0.05" value="1">
            <span class="sv" id="valA">1.00</span>
          </div>
          <div class="sl-row">
            <label style="color:#276749">b</label>
            <input type="range" id="sliderB" min="-10" max="10" step="0.1" value="0">
            <span class="sv" id="valB">0.00</span>
          </div>
        </div>
      </div>
      <div class="ctrl-sec">
        <div class="sec-label">최솟값</div>
        <div class="stat-row"><span class="stat-label">a*</span><span class="stat-val opt" id="optA">—</span></div>
        <div class="stat-row"><span class="stat-label">b*</span><span class="stat-val opt" id="optB">—</span></div>
        <div class="stat-row"><span class="stat-label">MSE*</span><span class="stat-val opt" id="optMSE">—</span></div>
        <button class="find-btn" id="btnFindMin" disabled>★ 최솟값 찾기</button>
      </div>
    </div>
  </div>

  <!-- 3단: 3D 곡면 -->
  <div class="panel panel-3d">
    <div class="panel-title">3D 손실함수 곡면 &nbsp;<span style="font-size:0.7rem;color:#a0aec0;font-weight:400;">(드래그로 회전)</span></div>
    <div class="surface-wrap" id="surfaceWrap">
      <canvas id="surfaceCvs"></canvas>
      <div id="surfaceHint" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
        font-size:0.85rem;color:#a0aec0;text-align:center;line-height:1.7;pointer-events:none;">
        데이터를 입력하면<br>3D 손실함수 곡면이 나타납니다
      </div>
    </div>
  </div>

</main>
<script src="lesson4a-script.js"></script>
</body>
</html>
