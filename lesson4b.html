<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4차시B — 경사하강법의 원리</title>
    <link rel="stylesheet" href="lesson-common.css">
    <link rel="stylesheet" href="lib/katex/katex.min.css">
    <style>
        .lesson-body { gap: 8px; padding: 8px; padding-right: 348px; min-height: 0; }

        .panel {
            background: #fff; border-radius: 14px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 왼쪽: 그래프 패널 */
        .panel-left { flex: 1; min-width: 0; padding: 0; border-right: none; gap: 0; }

        /* 오른쪽: 경사하강법 컨트롤 — overlay 방식 */
        .panel-right {
            position: absolute; right: 8px; top: 8px; bottom: 8px; width: 340px;
            border-left: none; padding: 0; gap: 0; border-radius: 14px;
            display: flex; flex-direction: column; overflow: hidden;
            transform: translateX(0); transition: transform 0.2s ease; z-index: 10;
        }
        .panel-right.hidden { transform: translateX(348px); }

        .panel-title {
            font-size: 0.78rem; font-weight: 700; color: #a0aec0;
            text-transform: uppercase; letter-spacing: 0.06em;
            padding: 9px 12px 7px; border-bottom: 1px solid #f0f4f8; flex-shrink: 0;
        }

        /* ===== 왼쪽 패널 ===== */
        .func-bar {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 8px 5px; flex-shrink: 0;
            border-bottom: 1px solid #f0f4f8;
        }
        .func-btn {
            flex: 1; padding: 5px 3px; border-radius: 7px; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; border: 1.5px solid #e2e8f0; background: #f7fafc; color: #4a5568;
            white-space: nowrap;
        }
        .func-btn:hover { background: #edf2f7; }
        .func-btn.active { background: #6c5ce7; color: #fff; border-color: #6c5ce7; }
        .btn-vtx {
            flex: 0 0 auto; padding: 5px 9px; border-radius: 7px; font-size: 0.76rem; font-weight: 700;
            cursor: pointer; border: 1.5px solid #e2e8f0; background: #f7fafc; color: #4a5568;
            white-space: nowrap;
        }
        .btn-vtx:hover { background: #edf2f7; }
        .btn-vtx.on { background: #f0fff4; border-color: #9ae6b4; color: #276749; }

        .formula-area {
            padding: 7px 12px 6px; border-bottom: 1px solid #f0f4f8; flex-shrink: 0;
            background: #f7fafc; overflow-x: auto;
        }
        .formula-area .katex-display { margin: 0.3em 0; }

        .canvas-wrap { flex: 1; min-height: 0; position: relative; }
        .canvas-wrap canvas { display: block; }
        .btn-toggle-right {
            position: absolute; top: 8px; right: 8px; z-index: 5;
            padding: 5px 10px; border-radius: 7px; font-size: 0.78rem; font-weight: 700;
            cursor: pointer; border: 1.5px solid #e2e8f0;
            background: rgba(255,255,255,0.92); color: #4a5568;
        }
        .btn-toggle-right:hover { background: rgba(237,242,247,0.95); }
        .btn-toggle-right.open { background: rgba(235,248,255,0.92); border-color: #90cdf4; color: #2b6cb0; }

        .point-info {
            padding: 7px 12px; border-top: 1px solid #f0f4f8; flex-shrink: 0;
            min-height: 44px; display: flex; flex-direction: column; justify-content: center;
        }
        .pi-hint { color: #a0aec0; font-size: 0.8rem; }
        .pi-row { display: flex; gap: 20px; font-size: 0.85rem; }
        .pi-label { color: #718096; font-weight: 600; margin-right: 3px; }
        .pi-val { font-weight: 700; color: #2d3748; }
        .pi-grad-pos { color: #e53e3e; }
        .pi-grad-neg { color: #3182ce; }

        /* ===== 오른쪽 패널 (4차시C 스타일) ===== */
        .play-bar {
            display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
            padding: 7px 10px; border-bottom: 1px solid #f0f4f8; flex-shrink: 0;
        }
        .play-bar button {
            padding: 5px 11px; border-radius: 7px; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; border: 1.5px solid #e2e8f0; background: #f7fafc; color: #4a5568;
        }
        .play-bar button:hover:not(:disabled) { background: #edf2f7; }
        .play-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
        #btnPlay  { background: #c6f6d5; border-color: #9ae6b4; color: #276749; }
        #btnStep  { background: #ebf8ff; border-color: #90cdf4; color: #2b6cb0; }
        #btnReset { background: #fff5f5; border-color: #fed7d7; color: #c53030; }
        .sl-row { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: #718096; font-weight: 600; }
        .sl-row input[type=range] { width: 70px; }

        .mid-scroll { overflow-y: auto; flex: 1; min-height: 0; }
        .ctrl-sec { padding: 10px 12px; border-bottom: 1px solid #f0f4f8; }
        .ctrl-sec:last-child { border-bottom: none; }
        .sec-label { font-size: 0.7rem; font-weight: 700; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
        .ctrl-row { margin: 6px 0; }
        .ctrl-row label { display: block; font-size: 0.74rem; color: #718096; font-weight: 600; margin-bottom: 3px; }
        .ctrl-row input[type=number] {
            width: 100%; border: 1px solid #e2e8f0; border-radius: 6px;
            padding: 5px 8px; font-size: 0.85rem; color: #2d3748; outline: none;
            -moz-appearance: textfield;
        }
        .ctrl-row input[type=number]::-webkit-outer-spin-button,
        .ctrl-row input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .ctrl-row input[type=number]:focus { border-color: #6c5ce7; }
        .ctrl-row input[type=range] { width: 100%; margin-top: 2px; }
        .formula-box { background: #f7fafc; border-radius: 7px; padding: 8px 10px; font-size: 0.88rem; line-height: 1.9; }
        .formula-line { color: #4a5568; line-height: 1.9; }
        .formula-vals { color: #2b6cb0; font-weight: 700; font-size: 0.82rem; word-break: break-all; }
        .stat-row { display: flex; gap: 8px; padding: 3px 0; font-size: 0.85rem; }
        .stat-label { color: #718096; font-weight: 600; min-width: 60px; }
        .stat-val { font-weight: 700; color: #2d3748; font-size: 0.95rem; }
        .stop-box {
            margin-top: 7px; padding: 6px 10px; background: #f0fff4; border: 1px solid #9ae6b4;
            border-radius: 7px; color: #276749; font-size: 0.78rem; font-weight: 700; text-align: center;
        }
        .hist-wrap { overflow-y: auto; max-height: 200px; }
        .hist-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        .hist-table th {
            color: #a0aec0; font-weight: 700; padding: 4px 2px; text-align: center;
            position: sticky; top: 0; background: #fff; border-bottom: 1px solid #edf2f7;
        }
        .hist-table td { padding: 3px 2px; text-align: center; border-bottom: 1px solid #f7fafc; color: #4a5568; }
        .hist-table tr.current-row td { background: #ebf8ff; font-weight: 700; color: #2b6cb0; }
    </style>
</head>
<body>
<header class="lesson-header">
    <a href="index.html" class="back-link">← 목록</a>
    <span class="lesson-title">4차시B — 경사하강법의 원리</span>
</header>
<main class="lesson-body">

    <!-- LEFT: 함수 그래프 -->
    <div class="panel panel-left">
        <div class="panel-title">함수 그래프</div>
        <div class="func-bar">
            <button class="func-btn active" data-idx="0">①</button>
            <button class="func-btn" data-idx="1">②</button>
            <button class="func-btn" data-idx="2">③</button>
            <button class="btn-vtx" id="btnVertex">표준형</button>
        </div>
        <div class="formula-area">
            <div id="formulaStd"></div>
            <div id="formulaVertex" style="visibility:hidden;"></div>
        </div>
        <div class="canvas-wrap" id="graphWrap">
            <canvas id="graphCvs"></canvas>
            <button class="btn-toggle-right" id="btnToggleRight">경사하강법 ▶</button>
        </div>
        <div class="point-info">
            <div class="pi-hint" id="piHint">그래프를 클릭하면 점과 접선의 기울기가 표시됩니다</div>
            <div id="piRows" style="display:none;">
                <div class="pi-row">
                    <span><span class="pi-label">x</span><span class="pi-val" id="piX">—</span></span>
                    <span><span class="pi-label">f(x)</span><span class="pi-val" id="piFx">—</span></span>
                    <span><span class="pi-label">접선의 기울기</span><span class="pi-val" id="piGrad">—</span></span>
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT: 경사하강법 컨트롤 (토글로 표시) -->
    <div class="panel panel-right hidden" id="rightPanel">
        <div class="panel-title">경사하강법</div>
        <div class="play-bar">
            <button id="btnPlay">▶ 실행</button>
            <button id="btnStep">한 단계</button>
            <button id="btnReset">↺ 초기화</button>
            <div class="sl-row">
                <label>속도</label>
                <input type="range" id="speedSlider" min="1" max="5" value="3">
            </div>
            <div class="sl-row">
                <label>단계 <span id="stepDisplay">0</span></label>
                <input type="range" id="stepSlider" min="0" max="0" value="0" disabled>
            </div>
        </div>
        <div class="mid-scroll">
            <div class="ctrl-sec">
                <div class="sec-label">초기 설정</div>
                <div class="ctrl-row">
                    <label>초깃값 x₀</label>
                    <input type="number" id="x0Input" step="0.1" value="4.5">
                </div>
                <div class="ctrl-row">
                    <label>학습률 α &nbsp;<span id="alphaDisplay">0.100</span></label>
                    <input type="range" id="alphaSlider" min="0.001" max="0.5" step="0.001" value="0.100">
                </div>
                <div class="ctrl-row">
                    <label>반복 횟수 n &nbsp;<span id="nDisplay">10</span></label>
                    <input type="range" id="nSlider" min="1" max="30" value="10">
                </div>
            </div>
            <div class="ctrl-sec">
                <div class="sec-label">경사하강법 공식</div>
                <div class="formula-box">
                    <div class="formula-line">\(x_{\text{new}} = x_{\text{old}} - \alpha \times f'(x_{\text{old}})\)</div>
                    <div class="formula-line formula-vals" id="formulaVals">—</div>
                </div>
            </div>
            <div class="ctrl-sec">
                <div class="sec-label">현재 단계</div>
                <div class="stat-row"><span class="stat-label">단계</span><span id="statStep" class="stat-val">—</span></div>
                <div class="stat-row"><span class="stat-label">x</span><span id="statX" class="stat-val">—</span></div>
                <div class="stat-row"><span class="stat-label">f(x)</span><span id="statFx" class="stat-val">—</span></div>
                <div class="stat-row"><span class="stat-label">접선의 기울기</span><span id="statGrad" class="stat-val">—</span></div>
                <div id="stopBox" class="stop-box" style="display:none">종료조건 도달 ✓</div>
            </div>
            <div class="ctrl-sec">
                <div class="sec-label">단계별 기록</div>
                <div class="hist-wrap">
                    <table class="hist-table">
                        <thead><tr><th>n</th><th>x</th><th>f(x)</th><th>접선의 기울기</th></tr></thead>
                        <tbody id="histTbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</main>
<script src="lib/katex/katex.min.js"></script>
<script src="lesson4b-script.js"></script>
<script src="lib/katex/contrib/auto-render.min.js"></script>
<script>renderMathInElement(document.body,{delimiters:[{left:"\\(",right:"\\)",display:false},{left:"\\[",right:"\\]",display:true}],throwOnError:false});</script>
</body>
</html>
